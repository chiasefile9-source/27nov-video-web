<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Truy Cập - Thư Viện Tài Liệu</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --error-color: #ef4444;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: #1e293b; margin-bottom: 0.5rem; font-size: 1.5rem; }
        p { color: #64748b; font-size: 0.95rem; margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1rem; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 0.5rem;
        }

        input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #1d4ed8; }

        #message { margin-top: 1rem; font-size: 0.9rem; min-height: 1.2rem; font-weight: 500; }
        .error { color: var(--error-color); }
        .success { color: #10b981; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔒 Truy cập tài liệu</h2>
    <p>Vui lòng điền thông tin và mật khẩu.</p>
    
    <div class="input-group">
        <input type="text" id="name" placeholder="Họ và tên của bạn" required>
        <input type="email" id="email" placeholder="Email của bạn" required>
        <input type="password" id="pw" placeholder="Mật khẩu truy cập">
    </div>
    
    <button id="btnVerify" onclick="verify()">Xác nhận truy cập</button>
    <div id="message"></div>
</div>

<script>
    async function verify() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const inputPw = document.getElementById('pw').value.trim();
        const msg = document.getElementById('message');
        const btn = document.getElementById('btnVerify');

        // Cấu hình
        const secret = "filenoibo.sagi-eleven";
        const target = "https://drive.google.com/drive/folders/1uFq1-OZcGy_V9w-Qsj3Msx6xlL7hSD4c?usp=sharing";
        const scriptURL = 'https://docs.google.com/spreadsheets/d/1n_XMHTS7euhWfWtdd7qOFqzm9oAVdpelZodDRi7WJnw/edit?usp=sharing';

        // Kiểm tra đầu vào
        if (!name || !email || !inputPw) {
            msg.className = "error";
            msg.innerText = "Vui lòng điền đầy đủ thông tin.";
            return;
        }

        if (inputPw !== secret) {
            msg.className = "error";
            msg.innerText = "Mật khẩu không chính xác.";
            return;
        }

        // Bắt đầu quá trình lưu và chuyển hướng
        try {
            btn.disabled = true;
            msg.className = "";
            msg.innerText = "Đang xác thực thông tin...";

            // Gửi dữ liệu đi bằng phương thức ẩn (no-cors)
            await fetch(scriptURL + `?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`, { 
                method: 'POST' 
            });

            msg.className = "success";
            msg.innerText = "Thành công! Đang chuyển hướng...";
            
            setTimeout(() => {
                window.location.href = target;
            }, 800);

        } catch (error) {
            console.error('Error!', error.message);
            msg.className = "error";
            msg.innerText = "Có lỗi xảy ra, vui lòng thử lại.";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
