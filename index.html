<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Video Công Khai</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; padding: 20px; border: 2px dashed #1877f2; border-radius: 8px; background: #faffff; }
        input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; background: #1877f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        
        /* Danh sách hiển thị công khai */
        .public-feed { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .post-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post-image { width: 100%; height: 250px; object-fit: cover; }
        .post-content { padding: 15px; }
        .post-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; display: block; }
        .video-link { display: block; color: #1877f2; text-decoration: none; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .video-link:hover { background: #f9f9f9; }
        .post-time { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Đăng Video Công Khai</h2>
    <div class="input-group">
        <input type="text" id="title" placeholder="Tiêu đề video/bài viết...">
        <input type="text" id="imageUrl" placeholder="Link ảnh minh họa (URL)...">
        <textarea id="multiLinks" placeholder="Dán link video (mỗi link 1 dòng)..."></textarea>
        <input type="password" id="password" style="border: 2px solid #fb3958" placeholder="Mã bảo mật để đăng (27nov.tv)">
        <button onclick="uploadPost()">Đăng Lên Bảng Tin Chung</button>
    </div>

    <div class="public-feed">
        <h2 style="text-align: center;">📺 BẢNG TIN CÔNG KHAI</h2>
        <div id="postContainer">Đang tải dữ liệu...</div>
    </div>
</div>

<script>
    // --- CẤU HÌNH FIREBASE (BẠN CẦN THAY THÔNG SỐ CỦA BẠN VÀO ĐÂY) ---
    // Để lấy thông số này, bạn vào Firebase Console -> Project Settings
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "your-project.firebaseapp.com",
        databaseURL: "https://your-project-default-rtdb.firebaseio.com",
        projectId: "your-project",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 1. HÀM ĐĂNG BÀI LÊN SERVER
    function uploadPost() {
        const title = document.getElementById('title').value;
        const imageUrl = document.getElementById('imageUrl').value || 'https://via.placeholder.com/400x200';
        const password = document.getElementById('password').value;
        const links = document.getElementById('multiLinks').value.split('\n').filter(l => l.trim() !== "");

        if (password !== "27nov.tv") {
            alert("Sai mật khẩu!");
            return;
        }
        if (!title || links.length === 0) {
            alert("Vui lòng nhập đủ tin!");
            return;
        }

        // Đẩy dữ liệu lên nhánh "posts" trên Firebase
        const newPostRef = database.ref('posts').push();
        newPostRef.set({
            title: title,
            imageUrl: imageUrl,
            links: links,
            timestamp: Date.now()
        }).then(() => {
            alert("Đã đăng công khai thành công!");
            document.getElementById('title').value = '';
            document.getElementById('multiLinks').value = '';
        });
    }

    // 2. HÀM LẮNG NGHE DỮ LIỆU (Tự động cập nhật cho TẤT CẢ mọi người)
    database.ref('posts').orderByChild('timestamp').on('value', (snapshot) => {
        const postContainer = document.getElementById('postContainer');
        postContainer.innerHTML = ''; // Xóa tin cũ để render mới
        
        const data = snapshot.val();
        if (!data) {
            postContainer.innerHTML = '<p style="text-align:center">Chưa có video nào được đăng.</p>';
            return;
        }

        // Chuyển object thành mảng và đảo ngược để tin mới nhất lên đầu
        Object.keys(data).reverse().forEach(key => {
            const post = data[key];
            const postHTML = `
                <div class="post-card">
                    <img src="${post.imageUrl}" class="post-image">
                    <div class="post-content">
                        <span class="post-title">${post.title}</span>
                        <div class="links-list">
                            ${post.links.map((l, i) => `<a href="${l}" target="_blank" class="video-link">▶ Xem Video ${i+1}</a>`).join('')}
                        </div>
                        <div class="post-time">Đăng lúc: ${new Date(post.timestamp).toLocaleString()}</div>
                    </div>
                </div>
            `;
            postContainer.insertAdjacentHTML('beforeend', postHTML);
        });
    });
</script>

</body>
</html>
