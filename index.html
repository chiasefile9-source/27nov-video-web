<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Truy Cập - Thư Viện Tài Liệu</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --error-color: #ef4444;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #1e293b;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        p {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        #message {
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
            font-weight: 500;
        }

        .error { color: var(--error-color); }
        .success { color: #10b981; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔒 Bảo mật nội dung</h2>
    <p>Vui lòng nhập mật khẩu được cung cấp để tiếp tục đến liên kết Google Drive.</p>
    
    <div class="input-group">
        <input type="password" id="pw" placeholder="Nhập mật khẩu tại đây..." autocomplete="off">
    </div>
    
    <button onclick="verify()">Xác nhận truy cập</button>
    <div id="message"></div>
</div>

<script>
    function verify() {
        const input = document.getElementById('pw').value.trim(); // .trim() để loại bỏ khoảng trắng thừa
        const msg = document.getElementById('message');
        
        // Cấu hình thông tin
        const secret = "filenoibo.sagi-eleven";
        const target = "https://drive.google.com/drive/folders/1uFq1-OZcGy_V9w-Qsj3Msx6xlL7hSD4c?usp=sharing";

        if (input === secret) {
            msg.className = "success";
            msg.innerText = "Mật khẩu đúng! Đang chuyển hướng...";
            
            // Chuyển hướng sau 0.5 giây để người dùng kịp thấy thông báo thành công
            setTimeout(() => {
                window.location.href = target;
            }, 500);
        } else if (input === "") {
            msg.className = "error";
            msg.innerText = "Vui lòng không để trống mật khẩu.";
        } else {
            msg.className = "error";
            msg.innerText = "Mật khẩu không chính xác. Thử lại!";
            document.getElementById('pw').value = ""; // Xóa mật khẩu sai
            document.getElementById('pw').focus();   // Đưa con trỏ lại ô nhập
        }
    }

    // Lắng nghe sự kiện phím Enter
    document.getElementById('pw').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            verify();
        }
    });
</script>

</body>
</html>
